name: Lint
on:
  workflow_call:
    inputs:
      solution:
        description: Solution to run linting against
        required: true
        type: string

    secrets:
      github-token:
        description: secrets.BUILD_GITHUB_TOKEN
        required: true
      sonar-token:
        description: secrets.SONAR_TOKEN
        required: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.github-token }}
      GITHUB_USERNAME: GitHub
    steps:
      - uses: actions/setup-java@v1
        with:
          java-version: 1.11

      - uses: actions/checkout@v3

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v3
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path ./.sonar/scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.github-token }}
          SONAR_TOKEN: ${{ secrets.sonar-token }}
        shell: pwsh
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin /v:${{ github.sha }}
          dotnet build ${{ inputs.solution }} -v q
          .\.sonar\scanner\dotnet-sonarscanner end

      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: code_analysis
          path: inspection_results.xml
